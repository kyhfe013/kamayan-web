<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交流会活用AI診断｜Kamada Kyohei</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="../resources/design_system.css">
    
    <style>
        body {
            background-color: #0c0c0e;
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        
        .hero-section {
            width: 100%;
            height: 45vh;
            background-image: url('hero.png');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-section::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background: linear-gradient(to top, #0c0c0e, transparent);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 24px 80px;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .content-area {
            margin-top: -40px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            line-height: 1.3;
            margin-bottom: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 48px;
        }

        .highlight {
            color: #a5b4fc;
            font-weight: 600;
        }

        .cta-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .line-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #06C755;
            color: white;
            text-decoration: none;
            padding: 20px 40px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1.2rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(6, 199, 85, 0.3);
            width: 100%;
            max-width: 360px;
        }

        .line-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(6, 199, 85, 0.4);
            filter: brightness(1.1);
        }

        .footer {
            margin-top: 100px;
            padding: 40px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.6rem;
            }
            p {
                font-size: 1rem;
            }
            .hero-section {
                height: 35vh;
            }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <!-- Background by hero.png -->
    </section>

    <div class="container">
        <div class="content-area">
            <h1>交流会での出会いを、<br>一生モノの資産に変える。</h1>
            
            <p>
                「名刺が増えるだけで終わっていませんか？」<br>
                出会いを成果へと変えるロードマップを、<br>
                <span class="highlight">「交流会活用AI診断」</span>で今すぐ手にしてください。
            </p>

            <div class="cta-area">
                <a href="https://lin.ee/OQrQd4J" class="line-button">
                交流会活用AI診断を開始する
                </a>
            </div>

            <footer class="footer">
                &copy; Kamada Kyohei | 鎌田恭平
            </footer>
        </div>
    </div>

</body>
</html>
