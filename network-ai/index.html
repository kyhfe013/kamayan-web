<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交流会活用AI診断｜Kama-yan</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="../resources/design_system.css">
    
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #0c0c0e 0%, #1a1a2e 100%);
        }
        
        .card {
            background-color: rgba(22, 22, 25, 0.8);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @media (max-width: 480px) {
            .card {
                border-radius: 16px;
            }
            .card-content {
                padding: 24px 20px;
            }
            .card h1 {
                font-size: 1.35rem;
            }
        }


        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-image {
            width: 100%;
            height: 200px;
            background-image: url('hero.png');
            background-size: cover;
            background-position: center;
        }

        .card-content {
            padding: 32px 24px;
        }

        .card h1 {
            font-size: 1.5rem;
            margin-bottom: 16px;
            line-height: 1.4;
            color: var(--text-primary);
        }

        .card p {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .line-button {
            display: block;
            background-color: #06C755; /* LINE Green */
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(6, 199, 85, 0.3);
        }

        .line-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 199, 85, 0.4);
            filter: brightness(1.1);
        }

        .footer-text {
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-image"></div>
        <div class="card-content">
            <h1>交流会での出会いを、<br>一生モノの資産に変える。</h1>
            <p>「名刺が増えるだけで終わっていませんか？」<br>成果を阻むズレを特定するロードマップを、AI診断で手に入れてください。</p>
            
            <a href="https://lin.ee/OQrQd4J" class="line-button">
                交流会活用AI診断を開始する
            </a>

            <div class="footer-text">
                &copy; Kama-yan | 鎌田恭平
            </div>
        </div>
    </div>

</body>
</html>
